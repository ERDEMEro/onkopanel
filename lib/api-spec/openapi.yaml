openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Oncology patient data API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: oncology
    description: Oncology patient data operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /oncology/summary:
    get:
      operationId: getOncologySummary
      tags: [oncology]
      summary: Get high-level summary KPIs
      description: Returns total patient count, gender distribution, death count, average age
      responses:
        "200":
          description: Summary KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OncologySummary"

  /oncology/gender-distribution:
    get:
      operationId: getGenderDistribution
      tags: [oncology]
      summary: Gender distribution
      description: Count of patients by gender
      responses:
        "200":
          description: Gender distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelCount"

  /oncology/age-distribution:
    get:
      operationId: getAgeDistribution
      tags: [oncology]
      summary: Age distribution by decade
      description: Count of patients grouped into 10-year age brackets
      responses:
        "200":
          description: Age distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelCount"

  /oncology/department-distribution:
    get:
      operationId: getDepartmentDistribution
      tags: [oncology]
      summary: Department distribution
      description: Count of patient visits per department (top 10)
      responses:
        "200":
          description: Department distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelCount"

  /oncology/admission-types:
    get:
      operationId: getAdmissionTypes
      tags: [oncology]
      summary: Admission and arrival type breakdown
      description: Counts by başvuru tipi and geliş tipi
      responses:
        "200":
          description: Admission type breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdmissionTypes"

  /oncology/genetic-tests:
    get:
      operationId: getGeneticTests
      tags: [oncology]
      summary: Genetic test distribution
      description: Count of genetic tests performed (top 15)
      responses:
        "200":
          description: Genetic test distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelCount"

  /oncology/top-medications:
    get:
      operationId: getTopMedications
      tags: [oncology]
      summary: Top prescribed medications
      description: Most frequently ordered medications (top 20)
      responses:
        "200":
          description: Top medications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelCount"

  /oncology/procedure-types:
    get:
      operationId: getProcedureTypes
      tags: [oncology]
      summary: Procedure type distribution
      description: Count of procedures grouped by işlem tipi
      responses:
        "200":
          description: Procedure type distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelCount"

  /oncology/admission-trend:
    get:
      operationId: getAdmissionTrend
      tags: [oncology]
      summary: Monthly admission trend
      description: Number of admissions per month over time
      responses:
        "200":
          description: Monthly admission trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /oncology/meds-by-cancer-type:
    get:
      operationId: getMedsByCancerType
      tags: [oncology]
      summary: Top medications grouped by cancer type
      description: Returns top 6 medications for each detected cancer type
      responses:
        "200":
          description: Medications by cancer type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CancerTypeMeds"

  /oncology/patients:
    get:
      operationId: getPatients
      tags: [oncology]
      summary: Patient list with filters
      description: Paginated and filterable patient list
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: gender
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Patient list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientList"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the `returnTo` path on success or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerWithPassword
      summary: Create a new account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Account created and session started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginWithPassword
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutSession
      summary: Clear the current session
      responses:
        "200":
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LabelCount:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
      required:
        - label
        - count

    TrendPoint:
      type: object
      properties:
        month:
          type: string
        count:
          type: integer
      required:
        - month
        - count

    OncologySummary:
      type: object
      properties:
        totalPatients:
          type: integer
        femaleCount:
          type: integer
        maleCount:
          type: integer
        averageAge:
          type: number
        withGeneticTest:
          type: integer
        totalAdmissions:
          type: integer
        departmentCount:
          type: integer
      required:
        - totalPatients
        - femaleCount
        - maleCount
        - averageAge
        - withGeneticTest
        - totalAdmissions
        - departmentCount

    AdmissionTypes:
      type: object
      properties:
        basvuruTipi:
          type: array
          items:
            $ref: "#/components/schemas/LabelCount"
        gelisTipi:
          type: array
          items:
            $ref: "#/components/schemas/LabelCount"
        yatisTipi:
          type: array
          items:
            $ref: "#/components/schemas/LabelCount"
      required:
        - basvuruTipi
        - gelisTipi
        - yatisTipi

    CancerTypeMeds:
      type: object
      properties:
        cancerType:
          type: string
        medications:
          type: array
          items:
            $ref: "#/components/schemas/LabelCount"
      required:
        - cancerType
        - medications

    Patient:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        gender:
          type: string
        birthDate:
          type: string
        age:
          type: integer
        department:
          type: string
        admissionDate:
          type: string
        hasGeneticTest:
          type: boolean
        admissionType:
          type: string
        arrivalType:
          type: string
      required:
        - id
        - clientId
        - gender
        - department

    PatientList:
      type: object
      properties:
        patients:
          type: array
          items:
            $ref: "#/components/schemas/Patient"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - patients
        - total
        - page
        - limit

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, "null"]
          format: email
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        profileImageUrl:
          type: [string, "null"]
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 6
        firstName:
          type: string
        lastName:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
